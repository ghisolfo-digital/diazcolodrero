<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vamos a conocernos DG-DC4</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 32px 16px 48px;
      text-align: center;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .chart-module {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 20px;
      padding: 28px 24px;
      margin-top: 28px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
      text-align: left;
    }

    .chart-title {
      font-size: 22px;
      line-height: 1.35;
      margin: 0 0 24px;
      text-align: center;
    }

    .chart-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .chart-svg {
      width: 320px;
      height: 320px;
      display: block;
      flex: 0 0 auto;
    }

    .legend {
      text-align: left;
      min-width: 220px;
      max-width: 360px;
    }

    .legend div {
      margin: 8px 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .color-box {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border-radius: 3px;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .total {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px 36px;
      }

      .page-header h1 {
        font-size: 24px;
      }

      .chart-module {
        padding: 22px 16px;
        margin-top: 20px;
        border-radius: 16px;
      }

      .chart-title {
        font-size: 19px;
      }

      .chart-svg {
        width: 280px;
        height: 280px;
      }

      .legend {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page-header">
      <h1>Vamos a conocernos DG-DC4</h1>
      <div id="status">Cargando datos...</div>
    </div>

    <div id="charts-container"></div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR107pzp7WGg3LIMUsPuVQ61yKfBlxN78h8KVKcECCD9TN8-4r_uNucO00xq37pc6l-Z087RQaFtQI3/pub?gid=2135986908&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && nextChar === "\n") {
            i++;
          }
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      rows.push(row);

      return rows;
    }

    async function loadCSVData() {
      const response = await fetch(CSV_URL);

      if (!response.ok) {
        throw new Error("No se pudo cargar el CSV");
      }

      const text = await response.text();
      return parseCSV(text.trim());
    }
  </script>

  <script>
    // Índices:
    // H = 7
    // I = 8
    // J = 9
    // K = 10
    // L = 11

    function polarToCartesian(cx, cy, r, angleDeg) {
      const angleRad = (angleDeg - 90) * Math.PI / 180.0;
      return {
        x: cx + (r * Math.cos(angleRad)),
        y: cy + (r * Math.sin(angleRad))
      };
    }

    function describeArcSlice(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

      return [
        "M", cx, cy,
        "L", start.x, start.y,
        "A", r, r, 0, largeArcFlag, 0, end.x, end.y,
        "Z"
      ].join(" ");
    }

    function normalizeValue(value) {
      return (value || "").trim();
    }

    function countByOptions(data, columnIndex, allowedOptions) {
      const counts = {};
      allowedOptions.forEach(option => {
        counts[option] = 0;
      });

      data.forEach(row => {
        const val = normalizeValue(row[columnIndex]);
        if (val in counts) {
          counts[val]++;
        }
      });

      return counts;
    }

    function createChartModule(config) {
      const container = document.getElementById("charts-container");

      const module = document.createElement("section");
      module.className = "chart-module";

      const title = document.createElement("h2");
      title.className = "chart-title";
      title.textContent = config.title;

      const chartArea = document.createElement("div");
      chartArea.className = "chart-area";

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("id", config.chartId);
      svg.setAttribute("viewBox", "0 0 320 320");
      svg.setAttribute("aria-label", config.title);
      svg.setAttribute("class", "chart-svg");

      const legend = document.createElement("div");
      legend.className = "legend";
      legend.id = config.legendId;

      const total = document.createElement("div");
      total.className = "total";
      total.id = config.totalId;

      chartArea.appendChild(svg);
      chartArea.appendChild(legend);

      module.appendChild(title);
      module.appendChild(chartArea);
      module.appendChild(total);

      container.appendChild(module);
    }

    function drawPieSVG(svgId, legendId, totalId, counts, colors, labelOrder) {
      const total = Object.values(counts).reduce((sum, value) => sum + value, 0);

      const svg = document.getElementById(svgId);
      const legend = document.getElementById(legendId);
      const totalEl = document.getElementById(totalId);

      svg.innerHTML = "";
      legend.innerHTML = "";

      if (total === 0) {
        totalEl.textContent = "Total respuestas: 0";
        legend.innerHTML = "<div>No hay respuestas válidas.</div>";
        return;
      }

      const cx = 160;
      const cy = 160;
      const r = 120;
      let currentAngle = 0;

      labelOrder.forEach(key => {
        const value = counts[key];
        if (value === 0) return;

        const sliceAngle = (value / total) * 360;
        const startAngle = currentAngle;
        const endAngle = currentAngle + sliceAngle;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", describeArcSlice(cx, cy, r, startAngle, endAngle));
        path.setAttribute("fill", colors[key] || "#cccccc");
        svg.appendChild(path);

        currentAngle = endAngle;
      });

      labelOrder.forEach(key => {
        const value = counts[key];
        if (value === 0) return;

        const percent = total ? Math.round((value / total) * 100) : 0;

        const item = document.createElement("div");
        item.innerHTML = `
          <span class="color-box" style="background:${colors[key] || '#cccccc'}"></span>
          ${key}: ${value} (${percent}%)
        `;
        legend.appendChild(item);
      });

      totalEl.textContent = "Total respuestas: " + total;
    }

    async function initCharts() {
      const statusEl = document.getElementById("status");

      try {
        const rows = await loadCSVData();
        const data = rows.slice(1);

        // 1) Figma
        createChartModule({
          title: "¿Cuánto considerás que sabés sobre Figma? (1 a 5)",
          chartId: "chart-l",
          legendId: "legend-l",
          totalId: "total-l"
        });

        const countsL = countByOptions(data, 11, ["1", "2", "3", "4", "5"]);

        drawPieSVG(
          "chart-l",
          "legend-l",
          "total-l",
          countsL,
          {
            "1": "#ff6b6b",
            "2": "#ffa94d",
            "3": "#ffd43b",
            "4": "#69db7c",
            "5": "#4dabf7"
          },
          ["1", "2", "3", "4", "5"]
        );

        // 2) Design Thinking
        createChartModule({
          title: "¿Alguna vez hiciste algún proyecto bajo el proceso de Design Thinking?",
          chartId: "chart-k",
          legendId: "legend-k",
          totalId: "total-k"
        });

        const countsK = countByOptions(data, 10, ["Sí", "No", "No lo sé 🤷‍♂️"]);

        drawPieSVG(
          "chart-k",
          "legend-k",
          "total-k",
          countsK,
          {
            "Sí": "#4dabf7",
            "No": "#ff6b6b",
            "No lo sé 🤷‍♂️": "#ffd43b"
          },
          ["Sí", "No", "No lo sé 🤷‍♂️"]
        );

        // 3) UX
        createChartModule({
          title: "¿Cursaste la materia UX (experiencia de usuario)?",
          chartId: "chart-j",
          legendId: "legend-j",
          totalId: "total-j"
        });

        const countsJ = countByOptions(data, 9, [
          "Sí, ya la cursé",
          "La curso este año",
          "No, y no tengo pensado cursarla este año"
        ]);

        drawPieSVG(
          "chart-j",
          "legend-j",
          "total-j",
          countsJ,
          {
            "Sí, ya la cursé": "#4dabf7",
            "La curso este año": "#69db7c",
            "No, y no tengo pensado cursarla este año": "#ff6b6b"
          },
          [
            "Sí, ya la cursé",
            "La curso este año",
            "No, y no tengo pensado cursarla este año"
          ]
        );

        // 4) Computadora
        createChartModule({
          title: "Si hiciera falta, ¿podrías llevar una compu al aula algunas clases?",
          chartId: "chart-i",
          legendId: "legend-i",
          totalId: "total-i"
        });

        const countsI = countByOptions(data, 8, [
          "Sí, podría llevarla",
          "Es probable que sí",
          "Es probable que no",
          "No llevaré computadora",
          "No lo sé 🤷‍♂️"
        ]);

        drawPieSVG(
          "chart-i",
          "legend-i",
          "total-i",
          countsI,
          {
            "Sí, podría llevarla": "#4dabf7",
            "Es probable que sí": "#69db7c",
            "Es probable que no": "#ffd43b",
            "No llevaré computadora": "#ff6b6b",
            "No lo sé 🤷‍♂️": "#b197fc"
          },
          [
            "Sí, podría llevarla",
            "Es probable que sí",
            "Es probable que no",
            "No llevaré computadora",
            "No lo sé 🤷‍♂️"
          ]
        );

        // 5) Cátedra DG3
        createChartModule({
          title: "¿En qué cátedra cursaste DG3?",
          chartId: "chart-h",
          legendId: "legend-h",
          totalId: "total-h"
        });

        const countsH = countByOptions(data, 7, [
          "Díaz Colodrero 💛",
          "Ex Belluccia",
          "Gabriele",
          "Ex Mazzeo",
          "Melon",
          "Meygide Carpintero",
          "Pujol",
          "Ex Rico",
          "Salomone",
          "Transforma",
          "Ex Wolkowicz",
          "Otra"
        ]);

        drawPieSVG(
          "chart-h",
          "legend-h",
          "total-h",
          countsH,
          {
            "Díaz Colodrero 💛": "#ffd43b",
            "Ex Belluccia": "#69db7c",
            "Gabriele": "#4dabf7",
            "Ex Mazzeo": "#ff6b6b",
            "Melon": "#b197fc",
            "Meygide Carpintero": "#ffa94d",
            "Pujol": "#66d9e8",
            "Ex Rico": "#f783ac",
            "Salomone": "#94d82d",
            "Transforma": "#748ffc",
            "Ex Wolkowicz": "#ff922b",
            "Otra": "#adb5bd"
          },
          [
            "Díaz Colodrero 💛",
            "Ex Belluccia",
            "Gabriele",
            "Ex Mazzeo",
            "Melon",
            "Meygide Carpintero",
            "Pujol",
            "Ex Rico",
            "Salomone",
            "Transforma",
            "Ex Wolkowicz",
            "Otra"
          ]
        );

        statusEl.textContent = "";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Error al cargar los datos.";
      }
    }

    initCharts();
  </script>
</body>
</html>
