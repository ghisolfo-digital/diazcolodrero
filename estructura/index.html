<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño Gráfico - Cátedra Díaz Colodrero - Organigrama de cátedra</title>
  <link rel="stylesheet" href="estilos.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page">
    <div class="top-bar">
      <h1>Organigrama de cátedra</h1>

      <select id="year-selector" class="year-selector" aria-label="Seleccionar año"></select>
    </div>
    <section id="organigrama" class="tree">
      <p>Cargando…</p>
    </section>
  </main>

<button id="back-to-top" class="back-to-top">↑</button>

  <div id="lightbox" class="lightbox" hidden>
  <div class="lightbox-backdrop"></div>

  <article class="lightbox-card">
    <button class="lightbox-close" type="button">×</button>

    <div class="lightbox-photo" id="lightbox-photo"></div>

    <h2 id="lightbox-name"></h2>
    <p id="lightbox-apodo"></p>

    <div class="lightbox-meta">
      <p id="lightbox-nivel"></p>
      <p id="lightbox-comision"></p>
      <p id="lightbox-taller"></p>
      <p id="lightbox-equipo"></p>
    </div>
  </article>
</div>
</body>
</html>
